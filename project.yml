name: CaptureDemo
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    CLANG_ENABLE_OBJC_ARC: YES
    CLANG_ENABLE_MODULES: YES
    SWIFT_VERSION: 5.0
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  CaptureDemo:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: CaptureDemo
      - path: Resources
      - path: Services
      - path: ViewControllers
    dependencies:
      - framework: AVFoundation.framework
        embed: false
      - framework: ARKit.framework
        embed: false
      - framework: SceneKit.framework
        embed: false
      - framework: Metal.framework
        embed: false
      - framework: Photos.framework
        embed: false
      - sdk: CoreMedia.framework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.captureDemo
        INFOPLIST_KEY_NSCameraUsageDescription: "采集高质量视频素材用于3D重建"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "录制环境声音"
        INFOPLIST_KEY_CFBundleDisplayName: "相机采集"
        CLANG_ENABLE_OBJC_ARC: YES
    info:
      path: CaptureDemo/Info.plist
      properties:
        CFBundleDisplayName: "相机采集"
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "采集高质量视频素材用于3D重建"
        NSMicrophoneUsageDescription: "录制环境声音"
        NSPhotoLibraryUsageDescription: "读取和保存采集视频到系统相册"
        NSPhotoLibraryAddUsageDescription: "保存多镜头录制视频到系统相册"

  CaptureDemoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CaptureDemoTests
    dependencies:
      - target: CaptureDemo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.captureDemoTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CaptureDemo.app/CaptureDemo"
        BUNDLE_LOADER: "$(TEST_HOST)"
